<script>
function saveFile() {
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'Echo.html'; a.click();
  URL.revokeObjectURL(url);
}
</script>

// ── LOGIN ───────────────────────────────────────────────────────────────────
function Login({ onDone }) {
  const [phone, setPhone] = useState('');

  const [otp,   setOtp]   = useState(['','','','','','']);

  const handleOtp = (i, v) => {
    const next = [...otp];
    next[i] = v.replace(/\D/,'').slice(-1);
    setOtp(next);
    if (v && i < 5) document.getElementById('o'+(i+1))?.focus();
    if (next.every(d => d)) setTimeout(onDone, 500);
  };

  const ok = step==='otp' || phone.replace(/\D/g,'').length >= 8;

  return (
    <div style={{ height:'100%', background:'#fff', display:'flex', flexDirection:'column', padding:'56px 28px 36px' }}>

          <div style={{ fontSize:13, color:'#8892A4', marginTop:4 }}>Ta parole part. Elle revient.</div>

          <div style={{ fontSize:22, fontWeight:700, color:'#1A1A2E', marginBottom:6 }}>Bienvenue 👋</div>
          <div style={{ fontSize:14, color:'#8892A4', marginBottom:28 }}>Entrez votre numero pour commencer</div>
          <div style={{ display:'flex', alignItems:'center', gap:12, background:'#F5F7FF', borderRadius:16, padding:'14px 18px', border:'1.5px solid #EEF0F8' }}>

            <div style={{ width:1, height:22, background:'#e0e0e0' }}/>
            <input type="tel" placeholder="XX XX XX XX XX"
              value={phone} onChange={e => setPhone(e.target.value)}
              style={{ flex:1, border:'none', background:'transparent', fontSize:15, color:'#1A1A2E', outline:'none' }}
            />
          </div>
        </>) : (<>
          <div style={{ fontSize:22, fontWeight:700, color:'#1A1A2E', marginBottom:6 }}>Code recu ?</div>

            {otp.map((d,i) => (
              <input key={i} id={'o'+i} type="text" inputMode="numeric" maxLength={1}

                style={{ width:44, height:54, textAlign:'center', fontSize:22, fontWeight:700, border:`2px solid ${d?'#E94560':'#EEF0F8'}`, borderRadius:14, color:'#1A1A2E', outline:'none', background:'#F5F7FF', transition:'border 0.2s' }}
